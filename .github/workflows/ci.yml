name: ci

# Static code-health gate. The functional closed-loop evaluation needs Apple MPS +
# MuJoCo GL and is run locally (see results/champion_2026-07-21/BENCHMARK_REPORT.md),
# not on Linux CI runners.

on:
  push:
    branches: [main, "exp/deployable-temporal-controller"]
  pull_request:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile all modules (syntax gate)
        run: python -m compileall -q tinyvla scripts examples tests
      - name: Ruff lint (real-error codes, informational)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check --select E9,F63,F7,F82 tinyvla scripts

  tests:
    # Best-effort: installs base deps (no lerobot extra) and runs the non-heavy
    # unit tests headlessly. Informational — does not gate the build yet.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (base deps)
        run: pip install -e '.[test]'
      - name: Run non-heavy unit tests (headless MuJoCo)
        env:
          MUJOCO_GL: egl
        run: pytest -m "not heavy" -q
